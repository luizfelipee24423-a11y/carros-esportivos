<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário - SportCars Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <header>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">SportCars Gallery</a>
      </div>
    </nav>
  </header>

  <main class="container mt-5 mb-5 flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 500px;">
      <h2 class="text-center mb-4">Criar nova conta</h2>
      
      <form id="form-cadastro-usuario">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome Completo</label>
          <input type="text" class="form-control" id="nome" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">E-mail</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="login_novo" class="form-label">Login</label>
          <input type="text" class="form-control" id="login_novo" required>
        </div>
        <div class="mb-3">
          <label for="senha_nova" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senha_nova" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">Cadastrar</button>
      </form>
      
      <div class="mt-3 text-center">
        <p>Já tem conta? <a href="login.html" class="text-danger">Faça login</a></p>
      </div>
    </div>
  </main>

  <footer class="rodape mt-auto">
    <p>SportCars Gallery - Projeto acadêmico - PUC Minas</p>
  </footer>

  <script>
    document.getElementById('form-cadastro-usuario').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const nome = document.getElementById('nome').value;
      const email = document.getElementById('email').value;
      const login = document.getElementById('login_novo').value;
      const senha = document.getElementById('senha_nova').value;
      
      const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
      
     
      if (usuarios.some(u => u.login === login)) {
        alert('Este login já está em uso!');
        return;
      }

      const novoUsuario = {
        id: crypto.randomUUID(), 
        login: login,
        senha: senha,
        nome: nome,
        email: email,
        admin: false 
      };
      
      usuarios.push(novoUsuario);
      localStorage.setItem('usuarios', JSON.stringify(usuarios));
      
      alert('Cadastro realizado com sucesso! Faça login para continuar.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
