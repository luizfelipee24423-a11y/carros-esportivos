<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD de Carros - Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <header>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">SportCars Gallery</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuAdmin">
            <span class="navbar-toggler-icon"></span>
        </button>
  
        <div class="collapse navbar-collapse justify-content-end" id="menuAdmin">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link text-warning fw-bold" href="cadastro_itens.html">Cadastro (Admin)</a></li>
            <li class="nav-item"><a class="nav-link" href="favoritos.html">Favoritos</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="fazerLogout()">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container mt-4 mb-5 flex-grow-1">
    <h2 class="mb-4">Gerenciamento de Carros</h2>
    
    <div class="card p-4 mb-4">
      <h4 id="titulo-form">Cadastrar Novo Carro</h4>
      <form id="form-carro">
        <input type="hidden" id="carro-id">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nome do Carro</label>
            <input type="text" class="form-control" id="carro-nome" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Marca</label>
            <input type="text" class="form-control" id="carro-marca" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Ano</label>
            <input type="number" class="form-control" id="carro-ano" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Potência (ex: 600 cv)</label>
            <input type="text" class="form-control" id="carro-potencia" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Velocidade</label>
            <input type="text" class="form-control" id="carro-velocidade" required>
          </div>
          <div class="col-md-3 mb-3">
            <label class="form-label">Motor</label>
            <input type="text" class="form-control" id="carro-motor" required>
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">URL da Imagem Principal</label>
            <input type="text" class="form-control" id="carro-imagem" required>
          </div>
          <div class="col-12 mb-3">
            <label class="form-label">Descrição</label>
            <textarea class="form-control" id="carro-descricao" rows="3" required></textarea>
          </div>
          <div class="col-12 mb-3 form-check ms-3">
            <input type="checkbox" class="form-check-input" id="carro-destaque">
            <label class="form-check-label">Aparecer no Carrossel de Destaques?</label>
          </div>
        </div>
        <button type="submit" class="btn btn-success">Salvar Carro</button>
        <button type="button" class="btn btn-secondary d-none" id="btn-cancelar" onclick="cancelarEdicao()">Cancelar</button>
      </form>
    </div>

    <h4>Carros Cadastrados</h4>
    <div class="table-responsive">
      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Marca</th>
            <th>Destaque</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-carros">
          </tbody>
      </table>
    </div>
  </main>

  <footer class="rodape mt-auto">
    <p>SportCars Gallery - Projeto acadêmico - PUC Minas</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    
    const adminLogado = JSON.parse(sessionStorage.getItem('usuarioLogado'));
    if (!adminLogado || !adminLogado.admin) {
      alert("Acesso restrito a administradores.");
      window.location.href = 'index.html';
    }

    let carrosBase = JSON.parse(localStorage.getItem('carros')) || [];

    function renderizarTabela() {
      const tbody = document.getElementById('tabela-carros');
      tbody.innerHTML = '';
      
      carrosBase.forEach(carro => {
        tbody.innerHTML += `
          <tr>
            <td>${carro.id}</td>
            <td>${carro.nome}</td>
            <td>${carro.marca}</td>
            <td>${carro.destaque ? 'Sim' : 'Não'}</td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="editarCarro(${carro.id})">Editar</button>
              <button class="btn btn-sm btn-danger" onclick="excluirCarro(${carro.id})">Excluir</button>
            </td>
          </tr>
        `;
      });
    }

    document.getElementById('form-carro').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const idInput = document.getElementById('carro-id').value;
      
      const carroParaSalvar = {
        id: idInput ? parseInt(idInput) : Date.now(), 
        nome: document.getElementById('carro-nome').value,
        marca: document.getElementById('carro-marca').value,
        ano: document.getElementById('carro-ano').value,
        potencia: document.getElementById('carro-potencia').value,
        velocidade: document.getElementById('carro-velocidade').value,
        motor: document.getElementById('carro-motor').value,
        descricao: document.getElementById('carro-descricao').value,
        imagemPrincipal: document.getElementById('carro-imagem').value,
        destaque: document.getElementById('carro-destaque').checked,
        fotos: [] 
      };

      if (idInput) {
        
        const index = carrosBase.findIndex(c => c.id == idInput);
        
        carroParaSalvar.fotos = carrosBase[index].fotos;
        carrosBase[index] = carroParaSalvar;
      } else {
        // Cria novo
        carrosBase.push(carroParaSalvar);
      }

      localStorage.setItem('carros', JSON.stringify(carrosBase));
      renderizarTabela();
      cancelarEdicao();
      alert('Item salvo com sucesso!');
    });

    window.editarCarro = function(id) {
      const carro = carrosBase.find(c => c.id === id);
      if(carro) {
        document.getElementById('titulo-form').innerText = "Editar Carro";
        document.getElementById('carro-id').value = carro.id;
        document.getElementById('carro-nome').value = carro.nome;
        document.getElementById('carro-marca').value = carro.marca;
        document.getElementById('carro-ano').value = carro.ano;
        document.getElementById('carro-potencia').value = carro.potencia;
        document.getElementById('carro-velocidade').value = carro.velocidade;
        document.getElementById('carro-motor').value = carro.motor;
        document.getElementById('carro-descricao').value = carro.descricao;
        document.getElementById('carro-imagem').value = carro.imagemPrincipal;
        document.getElementById('carro-destaque').checked = carro.destaque;
        
        document.getElementById('btn-cancelar').classList.remove('d-none');
        window.scrollTo(0, 0);
      }
    };

    window.excluirCarro = function(id) {
      if(confirm('Tem certeza que deseja excluir este carro?')) {
        carrosBase = carrosBase.filter(c => c.id !== id);
        localStorage.setItem('carros', JSON.stringify(carrosBase));
        
       
        const todosFavoritos = JSON.parse(localStorage.getItem('favoritos')) || {};
        for (const userId in todosFavoritos) {
           todosFavoritos[userId] = todosFavoritos[userId].filter(favId => favId !== id);
        }
        localStorage.setItem('favoritos', JSON.stringify(todosFavoritos));

        renderizarTabela();
      }
    };

    window.cancelarEdicao = function() {
      document.getElementById('form-carro').reset();
      document.getElementById('carro-id').value = "";
      document.getElementById('titulo-form').innerText = "Cadastrar Novo Carro";
      document.getElementById('btn-cancelar').classList.add('d-none');
    };

    
    renderizarTabela();
  </script>
</body>
</html>
