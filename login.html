<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SportCars Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <header>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">SportCars Gallery</a>
      </div>
    </nav>
  </header>

  <main class="container mt-5 mb-5 flex-grow-1 d-flex justify-content-center align-items-center">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px;">
      <h2 class="text-center mb-4">Acesse sua conta</h2>
      
      <form id="form-login">
        <div class="mb-3">
          <label for="login" class="form-label">Login</label>
          <input type="text" class="form-control" id="login" required>
        </div>
        <div class="mb-3">
          <label for="senha" class="form-label">Senha</label>
          <input type="password" class="form-control" id="senha" required>
        </div>
        <button type="submit" class="btn btn-danger w-100">Entrar</button>
      </form>
      
      <div class="mt-3 text-center">
        <p>Ainda não tem conta? <a href="cadastro_usuario.html" class="text-danger">Cadastre-se</a></p>
      </div>
    </div>
  </main>

  <footer class="rodape mt-auto">
    <p>SportCars Gallery - Projeto acadêmico - PUC Minas</p>
  </footer>

  <script>
    document.getElementById('form-login').addEventListener('submit', function(e) {
      e.preventDefault(); 
      
      const loginInp = document.getElementById('login').value;
      const senhaInp = document.getElementById('senha').value;
      
      
      const usuarios = JSON.parse(localStorage.getItem('usuarios')) || [];
      
      
      const userEncontrado = usuarios.find(u => u.login === loginInp && u.senha === senhaInp);
      
      if (userEncontrado) {
       
        sessionStorage.setItem('usuarioLogado', JSON.stringify(userEncontrado));
        window.location.href = 'index.html';
      } else {
        alert('Login ou senha incorretos! Tente "admin" e "123" ou "user" e "123".');
      }
    });
  </script>
</body>
</html>
