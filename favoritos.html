<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meus Favoritos - SportCars Gallery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100">

  <header>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand text-danger fw-bold" href="index.html">SportCars Gallery</a>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipalFavs">
            <span class="navbar-toggler-icon"></span>
        </button>
  
        <div class="collapse navbar-collapse justify-content-end" id="menuPrincipalFavs">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item d-none" id="nav-cadastro"><a class="nav-link text-warning" href="cadastro_itens.html">Cadastro (Admin)</a></li>
            <li class="nav-item"><a class="nav-link text-danger fw-bold" href="favoritos.html">Favoritos</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="fazerLogout()">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="container mt-4 mb-4 flex-grow-1">
    <h2 class="mb-4">Meus Itens Favoritos</h2>
    
    <div id="mensagem-vazio" class="alert alert-warning d-none text-center">
      Você ainda não possui itens favoritos cadastrados.
    </div>
    
    <div class="row g-4" id="lista-favoritos"></div>
  </main>

  <footer class="rodape mt-auto">
    <p>SportCars Gallery - Projeto acadêmico - PUC Minas</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    // 1. Bloqueia quem não tá logado
    const usuarioLogado = JSON.parse(sessionStorage.getItem('usuarioLogado'));
    if (!usuarioLogado) {
      window.location.href = 'login.html';
    }

    // 2. Renderiza apenas os favoritos
    function carregarFavoritos() {
      const todosCarros = JSON.parse(localStorage.getItem('carros')) || [];
      const todosFavoritos = JSON.parse(localStorage.getItem('favoritos')) || {};
      const meusFavsIDs = todosFavoritos[usuarioLogado.id] || [];
      
      const divLista = document.getElementById('lista-favoritos');
      const divVazio = document.getElementById('mensagem-vazio');
      
      divLista.innerHTML = '';
      
      if (meusFavsIDs.length === 0) {
        divVazio.classList.remove('d-none'); // Mostra a mensagem de vazio
      } else {
        divVazio.classList.add('d-none');
        
        // Filtra só os carros que o ID está na minha lista de favoritos
        const carrosFavoritos = todosCarros.filter(carro => meusFavsIDs.includes(carro.id));
        
        carrosFavoritos.forEach(carro => {
          divLista.innerHTML += `
            <article class="col-12 col-md-4 col-lg-3">
              <div class="card h-100 position-relative">
                <button class="btn-favorito" onclick="removerFavoritoDaTela(${carro.id})">♥</button>
                <a href="detalhes.html?id=${carro.id}">
                  <img src="${carro.imagemPrincipal}" class="card-img-top" alt="${carro.nome}">
                </a>
                <div class="card-body">
                  <h5 class="card-title"><a href="detalhes.html?id=${carro.id}" class="text-decoration-none text-dark">${carro.nome}</a></h5>
                  <p class="meta m-0">${carro.marca}</p>
                </div>
              </div>
            </article>
          `;
        });
      }
    }

    // 3. Função extra pra desmarcar direto na tela de favoritos e já sumir da lista
    window.removerFavoritoDaTela = function(carroId) {
        // Usa a função do app.js para desmarcar do banco
        toggleFavorito(carroId); 
        // Recarrega a tela na mesma hora
        carregarFavoritos();
    };

    // Ajusta o menu caso o admin entre
    if (usuarioLogado && usuarioLogado.admin) {
        document.getElementById('nav-cadastro').classList.remove('d-none');
    }

    carregarFavoritos();
  </script>
</body>
</html>
